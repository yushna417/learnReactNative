
# ─────────────────────────────────────────────────────────────────
#  Dev:  docker compose up --build
#  Prod: docker compose --profile production up -d --build
# ─────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: dyp_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    restart: unless-stopped

  # ── Django Backend ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: dyp_backend
    volumes:
      - ./apps/backend:/apps/backend     # hot-reload in dev (harmless in prod)
      - static_volume:/apps/backend/static
      - media_volume:/apps/backend/media
    environment:
      DEBUG:                ${DEBUG}
      DJANGO_ENV:           ${DJANGO_ENV}
      DJANGO_SECRET_KEY:    ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DATABASE_URL:         postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "${BACKEND_PORT:-8000}:8000"     # direct access in dev; bind to 127.0.0.1:8000 in prod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  # ── Nginx + React (production only) ──────────────────────────
  # Built React files are baked into the image at build time
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    container_name: dyp_nginx
    ports:
      - "80:80"
    volumes:
      - static_volume:/static:ro
      - media_volume:/media:ro
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  app_network:
    driver: bridge