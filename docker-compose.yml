version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: digitalyellowpaper_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-digitalyellow_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-user@password}
      - POSTGRES_DB=${POSTGRES_DB:-yellow_paper}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-digitalyellow_user} -d ${POSTGRES_DB:-yellow_paper}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    restart: unless-stopped

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BACKEND_TARGET:-backend-dev}
    container_name: digitalyellowpaper_backend
    volumes:
      # Mount for hot reload in development
      - ./apps/backend:/app/backend
      - static_volume:/app/backend/static
      - media_volume:/app/backend/media
    environment:
      - DEBUG=${DEBUG:-True}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-digitalyellow_user}:${POSTGRES_PASSWORD:-user@password}@postgres:5432/${POSTGRES_DB:-yellow_paper}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,digitalyellowpaper}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-dev-key-change-in-production}
      - DJANGO_ENV=${DJANGO_ENV:-development}
    env_file:
      - .env.${ENV_FILE:-dev}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  # React Frontend (Development)
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-dev
    container_name: digitalyellowpaper_frontend_dev
    volumes:
      - ./apps/frontend:/app/frontend
      - /app/frontend/node_modules
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000/api}
      - CHOKIDAR_USEPOLLING=true  # For hot reload in Docker
    ports:
      - "${FRONTEND_DEV_PORT:-3000}:3000"
    command: sh -c "pnpm run dev -- --host 0.0.0.0 --port 3000"
    networks:
      - app_network
    restart: unless-stopped

  # React Frontend (Production)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: digitalyellowpaper_frontend
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-https://digitalyellowpaper/api}
    networks:
      - app_network
    restart: unless-stopped
    profiles:
      - production

  # Nginx (Production only)
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: digitalyellowpaper_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/static
      - media_volume:/media
    depends_on:
      - backend
      - frontend
    networks:
      - app_network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  app_network:
    driver: bridge